<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PT Kinarya Utama Teknik - Data Master Mobil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <div class="p-8" id="view-asset-master">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex justify-between items-center">
            <div>
                <h3 class="text-xl font-bold text-slate-800">Data Master Mobil</h3>
                <p class="text-sm text-slate-500">Monitoring unit, merk, dan kondisi operasional.</p>
            </div>
            <select id="filter-asset-master-kondisi" onchange="applyFilters()" class="border border-slate-300 rounded-lg p-2 text-sm">
                <option value="ALL">Semua Kondisi</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm"><canvas id="chart-asset-merek"></canvas></div>
            <div class="bg-white p-4 rounded-xl shadow-sm"><canvas id="chart-asset-jenis"></canvas></div>
            <div class="bg-white p-4 rounded-xl shadow-sm"><canvas id="chart-asset-kondisi"></canvas></div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left" id="table-asset-master">
                <thead class="bg-slate-100 text-xs uppercase text-slate-600">
                    <tr>
                        <th class="p-4">User</th>
                        <th class="p-4">Merk</th>
                        <th class="p-4">Tipe Unit (Kolom C)</th>
                        <th class="p-4">Jenis</th>
                        <th class="p-4">Kondisi</th>
                    </tr>
                </thead>
                <tbody id="table-body-asset" class="text-sm"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Simulasi data (Ganti URL dengan GScript Anda)
        let globalData = []; 

        async function renderData(data) {
            const filter = document.getElementById('filter-asset-master-kondisi').value;
            const filtered = filter === 'ALL' ? data : data.filter(d => d.Kondisi === filter);
            
            const tbody = document.getElementById('table-body-asset');
            tbody.innerHTML = filtered.map(row => `
                <tr class="border-b">
                    <td class="p-4">${row.User}</td>
                    <td class="p-4">${row.Merk}</td>
                    <td class="p-4 font-bold text-indigo-600">${row.Tipe}</td> 
                    <td class="p-4">${row.Jenis}</td>
                    <td class="p-4">${row.Kondisi}</td>
                </tr>
            `).join('');

            renderCharts(filtered);
        }

        function renderCharts(data) {
            // Logika grafik (Merk, Jenis, Kondisi)
            const ctx1 = document.getElementById('chart-asset-merek').getContext('2d');
            new Chart(ctx1, { type: 'doughnut', data: { /* data mapping */ } });
            // ... ulangi untuk chart lainnya
        }

        function applyFilters() {
            renderData(globalData);
        }
    </script>
</body>
</html>
