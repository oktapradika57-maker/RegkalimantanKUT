<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT KUT - Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .view-pane { animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
        .active-menu { background: #1e293b; color: white; border-left: 4px solid #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen">

    <div id="splash-screen" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center text-white">
        <div class="text-center"><i class="fa-solid fa-spinner animate-spin text-4xl mb-4 text-indigo-500"></i><p>Menyiapkan Data...</p></div>
    </div>

    <aside class="w-72 bg-slate-950 text-slate-400 overflow-y-auto">
        <div class="p-6 text-white font-bold text-lg">KUT DASHBOARD</div>
        <nav class="space-y-1 px-2">
            <a href="#sva" onclick="nav('sva')" class="nav-link block p-3 rounded hover:bg-slate-800">Monitoring SVA</a>
            <a href="#asset-genset" onclick="nav('asset-genset')" class="nav-link block p-3 rounded hover:bg-slate-800">Data Master Genset</a>
            <a href="#sdm" onclick="nav('sdm')" class="nav-link block p-3 rounded hover:bg-slate-800">Data SDM & Tools</a>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div id="dashboard-content">
            
            <section id="view-sva" class="view-pane hidden">
                <h2 class="text-xl font-bold mb-4">Monitoring SVA (Profit)</h2>
                <div class="grid grid-cols-4 gap-4 mb-6 bg-white p-4 rounded shadow">
                    <select id="f-sva-nop" onchange="renderActiveView()" class="border p-2 rounded text-sm"><option value="ALL">Semua NOP</option></select>
                    <select id="f-sva-tgl" onchange="renderActiveView()" class="border p-2 rounded text-sm"><option value="ALL">Semua Tanggal</option></select>
                    <select id="f-sva-bln" onchange="renderActiveView()" class="border p-2 rounded text-sm"><option value="ALL">Semua Bulan</option></select>
                    <select id="f-sva-stts" onchange="renderActiveView()" class="border p-2 rounded text-sm"><option value="ALL">Status Tiket</option></select>
                </div>
                <div id="table-sva" class="bg-white p-4 rounded shadow overflow-x-auto"></div>
            </section>

            <section id="view-sdm" class="view-pane hidden">
                <h2 class="text-xl font-bold mb-4">Data SDM & Total Tools (AB-DL)</h2>
                <div id="table-sdm" class="bg-white p-4 rounded shadow overflow-x-auto"></div>
            </section>
        </div>
    </main>

    <script>
        const SPREADSHEET_ID = '1hIeT51_SVdNrz62s93zpZNyqepBMdNCa-mDRH-wVOIw';
        let globalDataset = {};

        async function init() {
            const sheets = { 'sva': 'data SVA', 'sdm': 'SDM' };
            const res = await Promise.allSettled(Object.values(sheets).map(s => fetchSheet(s)));
            Object.keys(sheets).forEach((k, i) => globalDataset[k] = res[i].status === 'fulfilled' ? res[i].value : []);
            
            document.getElementById('splash-screen').style.display = 'none';
            renderActiveView();
        }

        async function fetchSheet(name) {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
            const cols = json.table.cols.map(c => c.label);
            return json.table.rows.map(r => { let o = {}; r.c.forEach((c, i) => o[cols[i]] = c ? c.v : null); return o; });
        }

        function renderActiveView() {
            const view = window.location.hash.replace('#', '') || 'sva';
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('view-' + view)?.classList.remove('hidden');
            
            if (view === 'sva') {
                let data = globalDataset['sva'] || [];
                // Update Filters
                updateDropdown('f-sva-nop', data, 'NOP');
                updateDropdown('f-sva-tgl', data, 'Tanggal');
                updateDropdown('f-sva-bln', data, 'Bulan');
                updateDropdown('f-sva-stts', data, 'Status_Tiket');

                const fN = document.getElementById('f-sva-nop').value;
                const fT = document.getElementById('f-sva-tgl').value;
                const fB = document.getElementById('f-sva-bln').value;
                const fS = document.getElementById('f-sva-stts').value;

                let filtered = data.filter(d => 
                    (fN === 'ALL' || d.NOP == fN) && (fT === 'ALL' || d.Tanggal == fT) && 
                    (fB === 'ALL' || d.Bulan == fB) && (fS === 'ALL' || d.Status_Tiket == fS)
                );
                buildTable('table-sva', filtered);
            } 
            else if (view === 'sdm') {
                let data = globalDataset['sdm'] || [];
                // Kalkulasi Tools (AB sampai DL)
                let summary = data.reduce((acc, row) => {
                    let kep = row['Kepemilikan'] || 'Tidak Diketahui';
                    if (!acc[kep]) acc[kep] = 0;
                    // Loop kolom AB (index 27) sampai DL (index 115)
                    Object.keys(row).forEach((key, index) => {
                        if (index >= 27 && index <= 115) acc[kep] += (parseFloat(row[key]) || 0);
                    });
                    return acc;
                }, {});
                
                let tableFormatted = Object.keys(summary).map(k => ({ 'Kepemilikan': k, 'Total_Tools': summary[k] }));
                buildTable('table-sdm', tableFormatted);
            }
        }

        function nav(id) { window.location.hash = '#' + id; }
        
        function updateDropdown(id, data, key) {
            const el = document.getElementById(id);
            const vals = [...new Set(data.map(i => i[key]).filter(v => v))];
            const current = el.value;
            el.innerHTML = `<option value="ALL">Semua ${key}</option>` + vals.map(v => `<option value="${v}" ${v==current?'selected':''}>${v}</option>`).join('');
        }

        function buildTable(id, data) {
            if(!data.length) { document.getElementById(id).innerHTML = "Data tidak ada."; return; }
            const keys = Object.keys(data[0]);
            let html = `<table class="w-full text-sm"><thead><tr class="border-b bg-slate-100">${keys.map(k=>`<th class="p-3 text-left">${k}</th>`).join('')}</tr></thead>`;
            html += `<tbody>${data.map(r=>`<tr class="border-b">${keys.map(k=>`<td class="p-3">${r[k]||'-'}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
            document.getElementById(id).innerHTML = html;
        }

        init();
    </script>
</body>
</html>
